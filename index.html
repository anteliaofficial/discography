<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>The Anti™ Radio ● On Air</title>
<meta name="theme-color" content="#0a0a0d">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Sora:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0a0a0d;
    --bg-raised: #131317;
    --line: #24242a;
    --ink: #f2ede7;
    --ink-dim: #9a9aa2;
    --accent: #c81e6b;
    --accent-dim: #6e2a48;
    --cool: #2fd0c0;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; height:100%; }
  body{
    background:var(--bg); color:var(--ink);
    font-family:'Sora', sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  ::selection{ background:var(--accent); color:#fff; }

  .app{ display:flex; flex-direction:column; min-height:100vh; padding-bottom:96px; }

  header.top{
    padding:28px 20px 14px; border-bottom:1px solid var(--line);
    position:sticky; top:0; z-index:20;
    background:rgba(10,10,13,0.92); backdrop-filter:blur(10px);
    display:flex; justify-content:space-between; align-items:flex-start;
  }
  header.top h1{ font-family:'Cinzel Decorative', serif; font-weight:700; font-size:22px; letter-spacing:0.3px; margin:0 0 2px; }
  header.top p{ margin:0; font-size:12px; color:var(--ink-dim); letter-spacing:0.5px; }
  .on-air-group{ display:inline-flex; align-items:center; gap:6px; margin-left:10px; }
  .rec-dot{ width:9px; height:9px; border-radius:50%; background:#ff3b3b; flex:0 0 auto; animation:recPulse 1.4s infinite ease-in-out; }
  .on-air-text{ font-size:0.75em; font-family:'Sora', sans-serif; font-weight:400; color:var(--ink-dim); }
  @keyframes recPulse{ 0%,100%{ opacity:1; } 50%{ opacity:.25; } }
  .refresh-btn{
    background:none; border:1px solid var(--line); color:var(--ink-dim);
    font-size:11px; letter-spacing:0.4px; text-transform:uppercase;
    padding:6px 10px; border-radius:6px; cursor:pointer; white-space:nowrap;
  }
  .refresh-btn:hover{ color:var(--ink); border-color:var(--accent-dim); }

  nav.projects, nav.categories{ display:flex; gap:6px; overflow-x:auto; padding:14px 20px 0; scrollbar-width:none; }
  nav.categories{ gap:8px; padding-top:16px; }
  .project-info{ padding:14px 20px 0; font-size:12.5px; line-height:1.55; color:var(--ink-dim); max-width:560px; }
  .project-info-text{ display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; overflow:hidden; text-overflow:ellipsis; }
  .project-info-text.expanded{ -webkit-line-clamp:unset; overflow:visible; }
  .project-info-toggle{ background:none; border:none; color:var(--accent); font-size:11px; letter-spacing:0.3px; padding:4px 0 0; cursor:pointer; font-family:'Sora', sans-serif; display:none; }
  nav.projects::-webkit-scrollbar, nav.categories::-webkit-scrollbar{ display:none; }
  .project-btn{
    flex:0 0 auto; background:transparent; border:1px solid var(--line); color:var(--ink-dim);
    padding:8px 14px; border-radius:999px; font-size:13px; cursor:pointer; white-space:nowrap; transition:all .2s ease;
  }
  .project-btn.active{ color:var(--bg); background:var(--ink); border-color:var(--ink); }
  .cat-btn{
    flex:0 0 auto; background:none; border:none; color:var(--ink-dim); padding:6px 2px;
    font-size:13px; letter-spacing:0.4px; text-transform:uppercase; cursor:pointer; border-bottom:2px solid transparent;
  }
  .cat-btn.active{ color:var(--ink); border-bottom-color:var(--accent); }

  .toolbar{ display:flex; justify-content:space-between; align-items:center; padding:18px 20px 6px; }
  .toolbar .count{ font-size:12px; color:var(--ink-dim); }
  .sort-btn{
    background:none; border:1px solid var(--line); color:var(--ink-dim);
    font-size:11px; letter-spacing:0.4px; text-transform:uppercase; padding:5px 10px; border-radius:6px; cursor:pointer;
  }

  main{ flex:1; padding:6px 20px 20px; }

  .state-msg{ text-align:center; padding:60px 20px; color:var(--ink-dim); font-size:13px; }
  .hex-halo{ width:52px; height:52px; border-radius:50%; padding:5px; margin:0 auto 18px; background:conic-gradient(from 0deg, #ff3b6b, #ffcf3b, #3bff8f, #3bd4ff, #a13bff, #ff3b6b); animation:hexSpin 1.3s linear infinite; }
  .hex-halo-inner{ width:100%; height:100%; border-radius:50%; background:var(--bg); }
  @keyframes hexSpin{ from{ transform:rotate(0deg); } to{ transform:rotate(360deg); } }

  .grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); gap:16px; margin-top:10px; }
  .card{ cursor:pointer; border-radius:10px; overflow:hidden; background:var(--bg-raised); border:1px solid var(--line); transition:transform .15s ease, border-color .15s ease; }
  .card:hover{ border-color:var(--accent-dim); transform:translateY(-2px); }
  .card .cover{ width:100%; aspect-ratio:1/1; background:linear-gradient(160deg,#1c1c22,#0a0a0d); display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .card .cover img{ width:100%; height:100%; object-fit:cover; display:block; }
  .card .cover .halo{ width:40%; aspect-ratio:1/1; border-radius:50%; background:conic-gradient(from 0deg, var(--accent), var(--cool), var(--accent)); opacity:.35; filter:blur(2px); }
  .card .meta{ padding:10px 12px 12px; }
  .card .meta .title{ font-size:13.5px; font-weight:500; line-height:1.3; margin-bottom:3px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; text-overflow:ellipsis; }
  .card .meta .date{ font-size:11px; color:var(--ink-dim); font-family:'IBM Plex Mono', monospace; }
  .card.empty{ opacity:.55; cursor:default; }
  .card.empty:hover{ transform:none; border-color:var(--line); }

  .tracklist{ margin-top:8px; }
  .back-btn{ background:none; border:none; color:var(--ink-dim); font-size:13px; cursor:pointer; padding:0; margin-bottom:16px; display:flex; align-items:center; gap:6px; }
  .track{ display:flex; align-items:center; gap:14px; padding:11px 4px; border-bottom:1px solid var(--line); cursor:pointer; }
  .track:hover{ background:rgba(255,255,255,0.02); }
  .track .n{ width:22px; text-align:right; font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--ink-dim); }
  .track .t{ flex:1; font-size:14px; }
  .track.playing .t, .track.playing .n{ color:var(--accent); }

  .discs-row{ display:flex; gap:12px; overflow-x:auto; padding:0 2px 8px; scrollbar-width:none; }
  .discs-row::-webkit-scrollbar{ display:none; }
  .disc-card{ flex:0 0 auto; width:120px; cursor:pointer; opacity:.5; transform:scale(.9); transition:all .25s ease; }
  .disc-card.active{ opacity:1; transform:scale(1); }
  .disc-card img, .disc-card .halo-placeholder{ width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:8px; border:1px solid var(--line); display:block; }
  .disc-card .halo-placeholder{ background:linear-gradient(160deg,#1c1c22,#0a0a0d); }
  .disc-tracklist{ animation: discIn .3s ease; }
  @keyframes discIn{ from{ opacity:0; transform:translateX(14px); } to{ opacity:1; transform:translateX(0); } }
  .album-title-multi{ font-family:'Sora', sans-serif; font-weight:500; font-size:22px; margin:0 0 2px; }
  .disc-name-active{ font-size:13px; color:var(--ink-dim); margin:0 0 16px; }
  .subtitle-row{ display:flex; align-items:center; gap:8px; }
  .solo-cover{ width:120px; height:120px; object-fit:cover; border-radius:10px; border:1px solid var(--line); display:block; margin-bottom:8px; }

  .player{
    position:fixed; left:0; right:0; bottom:0; z-index:30; background:var(--bg-raised); border-top:1px solid var(--line);
    padding:10px 16px; display:flex; align-items:center; gap:14px; transform:translateY(110%); transition:transform .3s ease;
  }
  .player.visible{ transform:translateY(0); }
  .halo-ring{ width:48px; height:48px; border-radius:50%; flex:0 0 auto; display:flex; align-items:center; justify-content:center; cursor:pointer; background:conic-gradient(var(--accent) calc(var(--pct,0) * 1%), var(--line) 0); padding:3px; }
  .halo-ring .inner{ width:100%; height:100%; border-radius:50%; background:var(--bg-raised); display:flex; align-items:center; justify-content:center; }
  .halo-ring svg{ width:16px; height:16px; fill:var(--ink); }
  .player .info{ flex:1; min-width:0; }
  .player .info .t{ font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .player .info .a{ font-size:11px; color:var(--ink-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .player .time{ font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--ink-dim); flex:0 0 auto; white-space:nowrap; }
  .player .ctrl{ display:flex; gap:10px; align-items:center; }
  .player .ctrl button{ background:none; border:none; color:var(--ink); cursor:pointer; padding:4px; }
  .player .ctrl button svg{ width:18px; height:18px; fill:var(--ink-dim); }
  .player .ctrl button:hover svg{ fill:var(--ink); }
  .seek-bar{ position:absolute; top:-8px; left:0; right:0; height:16px; cursor:pointer; }
  .progress-bar{ position:absolute; top:7px; left:0; height:2px; background:var(--accent); width:0%; pointer-events:none; }
  .seek-bar:hover .progress-bar{ height:3px; top:6.5px; }

  footer.credit{ text-align:center; padding:24px 20px 90px; font-size:11px; color:var(--ink-dim); }

  .reel-section{ padding:36px 20px 20px; border-top:1px solid var(--line); margin-top:20px; opacity:0; transition:opacity .6s ease; }
  .reel-section.visible{ opacity:1; }
  .reel-label{ text-align:center; font-size:11px; letter-spacing:1px; text-transform:uppercase; color:var(--ink-dim); margin-bottom:8px; }
  .reel-direction-row{ display:flex; justify-content:center; margin-bottom:14px; }
  .reel-direction-btn{ background:none; border:1px solid var(--line); color:var(--ink-dim); font-size:10px; letter-spacing:0.3px; text-transform:uppercase; padding:4px 9px; border-radius:6px; cursor:pointer; font-family:'Sora', sans-serif; }
  .reel-direction-btn:hover{ color:var(--ink); border-color:var(--accent-dim); }
  .reel-viewport{ position:relative; height:170px; overflow:hidden; max-width:560px; margin:0 auto; touch-action:none; cursor:default; }
  .reel-track{ position:absolute; top:0; left:0; width:100%; will-change:transform; }
  .reel-row{ height:34px; display:flex; align-items:center; justify-content:center; gap:8px; font-size:13px; white-space:nowrap; overflow:hidden; padding:0 30px; cursor:pointer; }
  .reel-row .rd{ font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--cool); flex:0 0 auto; }
  .reel-row .rt{ flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--ink); }
  .reel-fade{ position:absolute; left:0; right:0; height:52px; pointer-events:none; z-index:2; }
  .reel-fade-top{ top:0; background:linear-gradient(to bottom, var(--bg), transparent); }
  .reel-fade-bottom{ bottom:0; background:linear-gradient(to top, var(--bg), transparent); }

  .lightbox{ position:fixed; inset:0; background:rgba(5,5,7,0.92); z-index:50; display:none; flex-direction:column; align-items:center; justify-content:center; padding:32px; gap:14px; }
  .lightbox.visible{ display:flex; }
  .lightbox img{ max-width:90vw; max-height:80vh; width:auto; height:auto; border-radius:10px; box-shadow:0 20px 60px rgba(0,0,0,0.6); }
  .lightbox-close{ position:absolute; top:18px; right:20px; background:none; border:none; color:var(--ink); font-size:30px; line-height:1; cursor:pointer; padding:6px; }
  .lightbox-close:hover{ color:var(--accent); }
  .lightbox-nav{ display:flex; gap:28px; }
  .lightbox-arrow{ background:none; border:none; color:var(--ink-dim); font-size:14px; cursor:pointer; padding:6px 10px; transition:color .15s ease; }
  .lightbox-arrow:hover{ color:var(--accent); }
  .video-frame-wrap{ width:min(90vw, 800px); aspect-ratio:16/9; border-radius:10px; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,0.6); }
  .video-frame-wrap iframe{ width:100%; height:100%; border:0; display:block; }
  .video-btn{ background:none; border:1px solid var(--line); color:var(--ink-dim); border-radius:50%; width:22px; height:22px; flex:0 0 auto; font-size:9px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .video-btn:hover{ color:var(--ink); border-color:var(--accent-dim); }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div>
      <h1>The Anti™ Radio <span class="on-air-group"><span class="rec-dot"></span><span class="on-air-text">On Air</span></span></h1>
      <p id="subtitle">The Antelia™ Experience</p>
    </div>
    <button class="refresh-btn" id="refreshBtn">Retune</button>
  </header>

  <nav class="projects" id="projectNav"></nav>
  <div class="project-info" id="projectInfo">
    <div class="project-info-text" id="projectInfoText"></div>
    <button class="project-info-toggle" id="projectInfoToggle">Read more</button>
  </div>
  <nav class="categories" id="categoryNav"></nav>

  <div class="toolbar">
    <span class="count" id="countLabel"></span>
    <button class="sort-btn" id="sortBtn">Newest</button>
  </div>

  <main id="main"><div class="state-msg"><div class="hex-halo"><div class="hex-halo-inner"></div></div>Dialing into the HEX...</div></main>

  <section class="reel-section" id="reelSection" style="display:none">
    <div class="reel-label">Spin the Cylinder</div>
    <div class="reel-direction-row">
      <button class="reel-direction-btn" id="reelDirectionBtn">Rollin' Down</button>
    </div>
    <div class="reel-viewport" id="reelViewport">
      <div class="reel-fade reel-fade-top"></div>
      <div class="reel-track" id="reelTrack"></div>
      <div class="reel-fade reel-fade-bottom"></div>
    </div>
  </section>

  <footer class="credit">The Complete Discography of Mauro Fuentes</footer>
</div>

<div class="player" id="player">
  <div class="seek-bar" id="seekBar"><div class="progress-bar" id="progressBar"></div></div>
  <div class="halo-ring" id="playToggle"><div class="inner"><svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>
  <div class="info">
    <div class="t" id="nowTitle">—</div>
    <div class="a" id="nowAlbum">Tap a track to begin</div>
  </div>
  <div class="time" id="timeDisplay">0:00 / 0:00</div>
  <div class="ctrl">
    <button id="prevBtn" title="Previous"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
    <button id="nextBtn" title="Next"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
  </div>
</div>

<audio id="audio"></audio>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose" aria-label="Close">&times;</button>
  <img id="lightboxImg" src="" alt="Enlarged cover">
  <div class="lightbox-nav" id="lightboxNav">
    <button class="lightbox-arrow" id="lightboxPrev" aria-label="Previous">◀</button>
    <button class="lightbox-arrow" id="lightboxNext" aria-label="Next">▶</button>
  </div>
</div>

<div class="lightbox" id="videoLightbox">
  <button class="lightbox-close" id="videoLightboxClose" aria-label="Close">&times;</button>
  <div class="video-frame-wrap"><iframe id="videoLightboxFrame" src="" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe></div>
  <div class="lightbox-nav" id="videoLightboxNav">
    <button class="lightbox-arrow" id="videoLightboxPrev" aria-label="Previous">◀</button>
    <button class="lightbox-arrow" id="videoLightboxNext" aria-label="Next">▶</button>
  </div>
</div>

<script>
/* ======================================================
   CONFIGURACIÓN — reemplaza esto con tu propia clave
   ====================================================== */
const API_KEY = 'AIzaSyC_WhqaOc4ewDFlwdAf1nc2zVWzfLRLrJk';
const ROOT_FOLDER_ID = '1h5MrREPfZxbtxag4FXFIACUmMxqz1lV0';
const CACHE_KEY = 'antelia-catalog-cache-v2';
const CACHE_TTL_MS = 60 * 60 * 1000; // 1 hora

function driveImg(id){ return 'https://drive.google.com/thumbnail?id=' + id + '&sz=w600'; }
function driveAudio(id){ return 'https://www.googleapis.com/drive/v3/files/' + id + '?alt=media&key=' + API_KEY; }

function youtubeEmbedUrl(url){
  const m = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([A-Za-z0-9_-]{6,})/i);
  return m ? 'https://www.youtube.com/embed/' + m[1] + '?autoplay=1&rel=0' : null;
}

async function driveList(parentId){
  const q = encodeURIComponent("'" + parentId + "' in parents and trashed = false");
  const url = 'https://www.googleapis.com/drive/v3/files?q=' + q +
    '&orderBy=name&fields=files(id,name,mimeType)&pageSize=300&key=' + API_KEY;
  const res = await fetch(url);
  if (!res.ok){
    const err = await res.json().catch(() => ({}));
    throw new Error('Drive API error: ' + (err.error?.message || res.status));
  }
  const data = await res.json();
  return data.files || [];
}

function isFolder(f){ return f.mimeType === 'application/vnd.google-apps.folder'; }
function isAudio(f){ return f.mimeType === 'audio/mpeg' || /\.mp3$/i.test(f.name); }
function isImage(f){ return f.mimeType && f.mimeType.startsWith('image/'); }

function pickCoverImage(images){
  if (!images.length) return null;
  const scored = images.map(img => {
    const n = img.name.toLowerCase();
    let score = 0;
    if (/\(art by/.test(n)) score += 200;
    if (/\bfront\b/.test(n)) score += 100;
    if (/\bcover\b/.test(n)) score += 90;
    if (/\bfolder\b/.test(n)) score += 80;
    if (/\b(back|booklet|inside|insert|disc|cd|liner|tray|contra|photo shoot|shoot)\b/.test(n)) score -= 60;
    return { img, score };
  });
  scored.sort((a, b) => b.score - a.score);
  return scored[0].img;
}

function parseAlbumName(name){
  const m = name.match(/^\[(\d{4})\.(\d{2})\.(\d{2})\]\s*(.*)$/);
  if (m) return { title: m[4], date: m[1] + '.' + m[2] + '.' + m[3] };
  return { title: name, date: '' };
}

function parseTrackName(name){
  const m = name.match(/^(\d+)\.\s*(.*)\.mp3$/i);
  if (m) return { n: parseInt(m[1], 10), title: m[2] };
  return { n: 0, title: name.replace(/\.mp3$/i, '') };
}

async function mapLimit(items, limit, fn){
  const results = new Array(items.length);
  let index = 0;
  async function worker(){
    while (index < items.length){
      const current = index++;
      try {
        results[current] = await fn(items[current], current);
      } catch(e){
        console.error('mapLimit item failed:', items[current] && items[current].name, e);
        results[current] = null;
      }
    }
  }
  const workers = Array.from({ length: Math.min(limit, items.length) }, () => worker());
  await Promise.all(workers);
  return results;
}

function buildCoverSet(imageFiles){
  if (!imageFiles.length) return { cover: null, images: [] };
  const best = pickCoverImage(imageFiles);
  const ordered = [best, ...imageFiles.filter(f => f.id !== best.id)];
  return { cover: driveImg(best.id), images: ordered.map(f => driveImg(f.id)) };
}

function parseVideoText(text){
  const map = {};
  const blocks = text.split(/\r?\n\s*\r?\n/);
  blocks.forEach(block => {
    const lines = block.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
    if (!lines.length) return;
    const header = lines[0].replace(/^\d+\.\s*/, '').replace(/\.mp3$/i, '').trim().toLowerCase();
    const urls = lines.slice(1).filter(l => /^https?:\/\//i.test(l));
    if (urls.length) map[header] = urls;
  });
  return map;
}

async function fetchVideoMap(folderContents){
  const vidFile = folderContents.find(f => f.name && f.name.toLowerCase() === 'vid');
  if (!vidFile) return {};
  try {
    const res = await fetch('https://www.googleapis.com/drive/v3/files/' + vidFile.id + '?alt=media&key=' + API_KEY);
    if (!res.ok) return {};
    const text = await res.text();
    return parseVideoText(text);
  } catch(e){
    console.error('Failed to load VID file', e);
    return {};
  }
}

function attachVideos(tracks, videoMap){
  return tracks.map(t => ({ ...t, videos: videoMap[t.title.toLowerCase()] || [] }));
}

async function buildAlbum(folder){
  const contents = await driveList(folder.id);
  const directTracks = contents.filter(isAudio).map(f => {
    const parsed = parseTrackName(f.name);
    return { n: parsed.n, title: parsed.title, id: f.id };
  }).sort((a, b) => a.n - b.n);

  const subfolders = contents.filter(f => isFolder(f) && f.name.toLowerCase() !== 'cover art');
  const { title, date } = parseAlbumName(folder.name);

  if (directTracks.length === 0 && subfolders.length > 0){
    const discResults = await mapLimit(subfolders, 5, async (sub) => {
      const subContents = await driveList(sub.id);
      const tracks = subContents.filter(isAudio).map(f => {
        const parsed = parseTrackName(f.name);
        return { n: parsed.n, title: parsed.title, id: f.id };
      }).sort((a, b) => a.n - b.n);

      let discCover = null;
      let discImages = [];
      const subCoverFolder = subContents.find(f => isFolder(f) && f.name.toLowerCase() === 'cover art');
      const subCoverFolderContents = subCoverFolder ? await driveList(subCoverFolder.id) : subContents;
      const subCoverFiles = subCoverFolderContents.filter(isImage);
      ({ cover: discCover, images: discImages } = buildCoverSet(subCoverFiles));
      const subVideoMap = await fetchVideoMap(subCoverFolderContents);
      const releaseVideos = subVideoMap['release'] || [];
      return { name: sub.name, cover: discCover, images: discImages, tracks: attachVideos(tracks, subVideoMap), releaseVideos };
    });
    const discs = discResults.filter(Boolean);
    return { title, date, multiDisc: true, discs, cover: discs[0]?.cover || null, tracks: [] };
  }

  let cover = null;
  let images = [];
  const coverFolder = contents.find(f => isFolder(f) && f.name.toLowerCase() === 'cover art');
  const coverFolderContents = coverFolder ? await driveList(coverFolder.id) : contents;
  const coverFiles = coverFolderContents.filter(isImage);
  ({ cover, images } = buildCoverSet(coverFiles));
  const videoMap = await fetchVideoMap(coverFolderContents);
  const releaseVideos = videoMap['release'] || [];
  const tracksWithVideo = attachVideos(directTracks, videoMap);
  return { title, date, cover, images, tracks: tracksWithVideo, multiDisc: false, discs: [{ name: title, cover, images, tracks: tracksWithVideo, releaseVideos }] };
}

async function buildCatalog(){
  const projects = await driveList(ROOT_FOLDER_ID);
  const projectFolders = projects.filter(isFolder);

  const projectResults = await mapLimit(projectFolders, 3, async (proj) => {
    const categories = await driveList(proj.id);
    const categoryFolders = categories.filter(isFolder);

    const categoryResults = await mapLimit(categoryFolders, 3, async (cat) => {
      const albumFolders = await driveList(cat.id);
      const items = await mapLimit(albumFolders.filter(isFolder), 5, (alb) => buildAlbum(alb));
      return { id: cat.id, label: cat.name.replace(/^The\s+/i, ''), items: items.filter(Boolean) };
    });

    const catObj = {};
    categoryResults.forEach((c) => { catObj[c.id] = { label: c.label, items: c.items }; });
    return { id: proj.id, label: proj.name, categories: catObj };
  });

  const catalog = {};
  projectResults.forEach((p) => { catalog[p.id] = { label: p.label, categories: p.categories }; });
  return catalog;
}

async function getCatalog(forceRefresh){
  if (!forceRefresh){
    try {
      const cached = JSON.parse(localStorage.getItem(CACHE_KEY));
      if (cached && (Date.now() - cached.time) < CACHE_TTL_MS){
        return cached.data;
      }
    } catch(e){}
  }
  const data = await buildCatalog();
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({ time: Date.now(), data }));
  } catch(e){}
  return data;
}

function sortedCategoryKeys(project){
  const cats = CATALOG[project].categories;
  return Object.keys(cats).sort((a, b) => {
    const rankA = CATEGORY_PRIORITY.indexOf(cats[a].label.toLowerCase());
    const rankB = CATEGORY_PRIORITY.indexOf(cats[b].label.toLowerCase());
    const ra = rankA === -1 ? CATEGORY_PRIORITY.length : rankA;
    const rb = rankB === -1 ? CATEGORY_PRIORITY.length : rankB;
    return ra - rb;
  });
}

function loadAndPlay(){
  const track = state.queue[state.qIndex];
  if (!track) return;
  audio.src = driveAudio(track.id);
  audio.play().catch(()=>{});
  nowTitle.textContent = track.title;

  progressBar.style.width = '0%';
  haloRing.style.setProperty('--pct', 0);

function highlightPlayingRow(idx){
  document.querySelectorAll('.track').forEach(r => r.classList.remove('playing'));
  const row = document.querySelector('.track[data-idx="' + idx + '"]');
  if (row) row.classList.add('playing');

function updatePlayIcon(playing){
  playIcon.innerHTML = playing ? '<path d="M6 5h4v14H6zm8 0h4v14h-4z"/>' : '<path d="M8 5v14l11-7z"/>';
}
playToggle.onclick = () => {
  if (!audio.src) return;
  if (audio.paused){ audio.play(); updatePlayIcon(true); } else { audio.pause(); updatePlayIcon(false); }
};
document.getElementById('prevBtn').onclick = () => {
  if (state.qIndex > 0){ state.qIndex--; loadAndPlay(); }
  else if (state.chronoMode){ retreatChrono(); }
};
document.getElementById('nextBtn').onclick = () => {
  if (state.qIndex < state.queue.length - 1){ state.qIndex++; loadAndPlay(); }
  else if (state.chronoMode){ advanceChrono(); }
};
audio.addEventListener('ended', () => {
  if (state.qIndex < state.queue.length - 1){
    state.qIndex++;
    loadAndPlay();
  } else if (state.chronoMode){
    advanceChrono();
  } else {
    state.qIndex = 0;
    loadAndPlay();
  }
});
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  progressBar.style.width = pct + '%';
  haloRing.style.setProperty('--pct', pct.toFixed(1));
  timeDisplay.textContent = formatTime(audio.currentTime) + ' / ' + formatTime(audio.duration);
});

function formatTime(sec){
  if (!isFinite(sec) || sec < 0) return '0:00';
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60).toString().padStart(2, '0');
  return m + ':' + s;
}

let seeking = false;
function seekFromEvent(e){
  if (!audio.duration) return;
  const rect = seekBar.getBoundingClientRect();
  const pct = Math.min(Math.max((e.clientX - rect.left) / rect.width, 0), 1);
  audio.currentTime = pct * audio.duration;
  progressBar.style.width = (pct * 100) + '%';
  haloRing.style.setProperty('--pct', (pct * 100).toFixed(1));
}
seekBar.addEventListener('pointerdown', (e) => { seeking = true; seekFromEvent(e); });
window.addEventListener('pointermove', (e) => { if (seeking) seekFromEvent(e); });
window.addEventListener('pointerup', () => { seeking = false; });

}

/* Reel — full chronological timeline across every project */
const reelSection = document.getElementById('reelSection');
const reelViewport = document.getElementById('reelViewport');
const reelTrack = document.getElementById('reelTrack');
const reelDirectionBtn = document.getElementById('reelDirectionBtn');
reelDirectionBtn.onclick = () => {
  state.chronoStep = state.chronoStep === 1 ? -1 : 1;
  reelDirectionBtn.textContent = state.chronoStep === 1 ? "Rollin' Down" : "Rollin' Up";
};
const ROW_H = 34;
const VISIBLE_ROWS = 5;
const REEL_PAD = ROW_H * 2;
let reelEntries = [];
let reelOffset = 0;
let reelMaxOffset = 0;
let reelSpeed = 0;
let reelDragging = false;
let reelDragStartY = 0;
let reelDragStartOffset = 0;

function getAllTracksForItem(item){
  if (item.multiDisc){
    let all = [];
    item.discs.forEach((d) => { all = all.concat(d.tracks); });
    return all;
  }
  return item.tracks || [];
}

function playChronoFromReel(index){
  const entry = reelEntries[index];
  if (!entry || !entry.hasTracks) return;
  state.project = entry.projKey;
  state.category = entry.catKey;
  state.album = entry.item;
  state.discIndex = 0;
  state.chronoMode = true;
  state.chronoIndex = index;
  state.queue = getAllTracksForItem(entry.item);
  state.qIndex = 0;
  state.currentAlbumTitle = entry.projectLabel + ' - ' + entry.title;
  renderAll();
  loadAndPlay();
}

function retreatChrono(){
  if (!reelEntries.length) return;
  const step = state.chronoStep || 1;
  for (let count = 1; count <= reelEntries.length; count++){
    const idx = ((state.chronoIndex - step * count) % reelEntries.length + reelEntries.length) % reelEntries.length;
    if (reelEntries[idx].hasTracks){
      playChronoFromReel(idx);
      return;
    }
  }
}

function advanceChrono(){
  if (!reelEntries.length) return;
  let dir = state.chronoStep || 1;
  let idx = state.chronoIndex;
  const maxAttempts = reelEntries.length * 4 + 4;
  for (let attempts = 0; attempts < maxAttempts; attempts++){
    idx += dir;
    if (idx < 0 || idx >= reelEntries.length){
      dir = -dir;
      idx = state.chronoIndex;
      continue;
    }
    if (reelEntries[idx].hasTracks){
      state.chronoStep = dir;
      reelDirectionBtn.textContent = dir === 1 ? "Rollin' Down" : "Rollin' Up";
      playChronoFromReel(idx);
      return;
    }
  }
}

function buildReelEntries(){
  const entries = [];
  Object.keys(CATALOG).forEach((projKey) => {
    const project = CATALOG[projKey];
    Object.keys(project.categories).forEach((catKey) => {
      project.categories[catKey].items.forEach((item) => {
        if (!item.date) return;
        const hasTracks = (item.tracks && item.tracks.length > 0) ||
          (item.multiDisc && item.discs && item.discs.some(d => d.tracks.length > 0));
        entries.push({ date: item.date, title: item.title, projectLabel: project.label, projKey, catKey, item, hasTracks });
      });
    });
  });
  entries.sort((a, b) => b.date.localeCompare(a.date));
  return entries;
}

function renderReel(){
  reelEntries = buildReelEntries();
  if (!reelEntries.length){ reelSection.style.display = 'none'; return; }
  reelSection.style.display = 'block';
  reelTrack.innerHTML = '';
  reelEntries.forEach((entry, i) => {
    const row = document.createElement('div');
    row.className = 'reel-row';
    row.innerHTML = '<span class="rd">' + entry.date + '</span><span class="rt">' + entry.projectLabel + ' - ' + entry.title + '</span>';
    if (entry.hasTracks){
      row.onclick = () => {
        playChronoFromReel(i);
        document.querySelector('header.top').scrollIntoView({ behavior: 'smooth' });
      };
    } else {
      row.style.cursor = 'default';
    }
    reelTrack.appendChild(row);
  });
  reelTrack.style.paddingTop = REEL_PAD + 'px';
  reelTrack.style.paddingBottom = REEL_PAD + 'px';
  reelMaxOffset = Math.max(0, REEL_PAD * 2 + reelEntries.length * ROW_H - VISIBLE_ROWS * ROW_H);
  reelOffset = 0;
  updateReelPositions();
  requestAnimationFrame(() => { reelSection.classList.add('visible'); });
}

function updateReelPositions(){
  reelTrack.style.transform = 'translateY(' + (-reelOffset) + 'px)';
  const centerY = reelOffset + (VISIBLE_ROWS * ROW_H) / 2;
  const rows = reelTrack.children;
  for (let i = 0; i < rows.length; i++){
    const itemCenter = REEL_PAD + i * ROW_H + ROW_H / 2;
    const dist = Math.abs(itemCenter - centerY);
    const opacity = Math.max(0, 1 - dist / (ROW_H * 2));
    rows[i].style.opacity = opacity.toFixed(2);
  }
}

reelViewport.addEventListener('pointermove', (e) => {
  if (e.pointerType === 'touch' || reelDragging) return;
  const rect = reelViewport.getBoundingClientRect();
  const relY = e.clientY - rect.top;
  const zone = Math.min(VISIBLE_ROWS - 1, Math.max(0, Math.floor(relY / ROW_H)));
  const speeds = [-380, -130, 0, 130, 380];
  reelSpeed = speeds[zone];
});
reelViewport.addEventListener('pointerleave', () => { reelSpeed = 0; });

reelViewport.addEventListener('pointerdown', (e) => {
  if (e.pointerType !== 'touch') return;
  reelDragging = true;
  reelDragStartY = e.clientY;
  reelDragStartOffset = reelOffset;
  reelViewport.setPointerCapture(e.pointerId);
});
reelViewport.addEventListener('pointermove', (e) => {
  if (e.pointerType !== 'touch' || !reelDragging) return;
  const delta = e.clientY - reelDragStartY;
  reelOffset = Math.min(reelMaxOffset, Math.max(0, reelDragStartOffset - delta));
  updateReelPositions();
});
function endReelDrag(){ reelDragging = false; }
reelViewport.addEventListener('pointerup', endReelDrag);
reelViewport.addEventListener('pointercancel', endReelDrag);

let reelLastTime = null;
function reelTick(timestamp){
  if (reelLastTime === null) reelLastTime = timestamp;
  const dt = (timestamp - reelLastTime) / 1000;
  reelLastTime = timestamp;
  if (!reelDragging && reelSpeed !== 0 && reelEntries.length){
    reelOffset = Math.min(reelMaxOffset, Math.max(0, reelOffset + reelSpeed * dt));
    updateReelPositions();
  }
  requestAnimationFrame(reelTick);
}
requestAnimationFrame(reelTick);

/* Arranque */
(async () => {
  if (API_KEY === 'PEGA_AQUI_TU_API_KEY'){
    main.innerHTML = '<div class="state-msg">API Key not configured yet.<br>Open the code (look for API_KEY) and paste yours in.</div>';
    return;
  }
  try {
    CATALOG = await getCatalog(false);
    state.project = Object.keys(CATALOG)[0];
    state.category = sortedCategoryKeys(state.project)[0];
    renderAll();
    renderReel();
  } catch(e){
    main.innerHTML = '<div class="state-msg">Could not load the catalog.<br>' + e.message + '</div>';
  }
})();
</script>
